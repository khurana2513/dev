tunnel: talenthub-dev
credentials-file: /Users/YOUR_USERNAME/.cloudflared/talenthub-dev.json

# Routes all traffic for dev-api.blackmonkey.in → localhost:5000
ingress:
  - hostname: dev-api.blackmonkey.in
    service: http://localhost:5000
  - service: http_status:404

# SETUP INSTRUCTIONS (run once on Mac Mini):
#
# 1. Install cloudflared
#      brew install cloudflared
#
# 2. Log in to your Cloudflare account
#      cloudflared tunnel login
#    This opens a browser → select blackmonkey.in domain → authorises the tunnel.
#
# 3. Create the tunnel
#      cloudflared tunnel create talenthub-dev
#    Note the tunnel ID printed (e.g. abc123-...). Keep it.
#
# 4. Copy this config file
#      cp scripts/cloudflare-tunnel-config.yml ~/.cloudflared/config.yml
#    Replace YOUR_USERNAME with your Mac username.
#    Replace the credentials-file path with the actual .json generated in step 3.
#
# 5. Add DNS record
#      cloudflared tunnel route dns talenthub-dev dev-api.blackmonkey.in
#    This creates a CNAME in Cloudflare: dev-api.blackmonkey.in → tunnel
#
# 6. Start the tunnel (manual test)
#      cloudflared tunnel run talenthub-dev
#
# 7. Always-on: install as a launchd service
#      sudo cloudflared service install
#    After this, cloudflared starts on boot and runs the tunnel automatically.
#
# VERIFY:
#   Open https://dev-api.blackmonkey.in/health in browser → should return {"status":"ok"}
#
# NOTES:
# - The tunnel is FREE. Cloudflare handles SSL automatically.
# - No port forwarding on your router needed.
# - Works even without a static home IP.
# - If Mac Mini is off, the tunnel is down and dev-api.blackmonkey.in returns 502.
