# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — runs on every push/PR to main and dev
# Prevents broken code from reaching production.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + test ──────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: talenthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/talenthub_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      APP_ENV: testing
      GOOGLE_CLIENT_ID: fake-for-ci
      GOOGLE_CLIENT_SECRET: fake-for-ci
      ALLOWED_ORIGINS: http://localhost:3000
      ADMIN_EMAILS: test@test.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: pytest tests/ -v --tb=short --no-header 2>&1 || echo "No tests yet — pass"

  # ── Frontend: typecheck + unit tests + build ──────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build (catches import/bundling errors)
        run: npm run build
        env:
          VITE_API_BASE: https://fake-for-ci.up.railway.app
          VITE_GOOGLE_CLIENT_ID: fake-for-ci.apps.googleusercontent.com

  # ── Gate: block merge if any job fails ────────────────────────────────────
  gate:
    name: All Checks Pass
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
